---
x-config: &config
  POSTGRES_DB: postgres
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"

services:
  db:
    image: docker.io/pgautoupgrade/pgautoupgrade:17-bookworm
    container_name: db
    environment:
      <<: *config
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: /usr/local/bin/pgautoupgrade-healthcheck.sh
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  postgrest:
    container_name: postgrest
    image: docker.io/postgrest/postgrest:latest
    environment:
      <<: *config
      PGRST_DB_URI: postgres://fantasy_postgrest:fantasy_postgrest@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMA: fantasy_api
      PGRST_DB_ANON_ROLE: fantasy_visitor
    restart: always
    expose:
      - "3000"

  mathesar:
    container_name: mathesar
    image: docker.io/mathesar/mathesar:latest
    environment:
      <<: *config

      POSTGRES_USER: mathesar
      POSTGRES_PASSWORD: mathesar
      POSTGRES_DB: mathesar
    
      DOMAIN_NAME: http://localhost:8080

      DJANGO_SETTINGS_MODULE: config.settings.production

      ALLOWED_HOSTS: "*"

      DEBUG: true

      WEB_CONCURRENCY: 3

    volumes:
      - mathesar_static:/code/static
      - mathesar_media:/code/.media
      - mathesar_secrets:/code/.secrets
    healthcheck:
      test: curl -f http://localhost:8000
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: docker.io/caddy:latest
    restart: unless-stopped
    environment: *config
    ports:
      - "8080:8080"
    volumes:
      - ./caddy:/etc/caddy
      - mathesar_media:/code/.media
      - mathesar_static:/code/static
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  mathesar_static:
  mathesar_media:
  mathesar_secrets:
  caddy_config:
  caddy_data:
