[project]
name = "fantasy-jobs"
version = "0.1.0"
description = "Recurring tasks for fantasy.tf2.spot"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "psycopg[binary]>=3.3.4",
]

[project.scripts]
fantasy-jobs = "fantasy_jobs:main"

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"
